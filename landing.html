<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoGenius Contact Page</title>
    <link rel="stylesheet" href="landing2.css">
</head>
<body>

    <main class="container">
        <header>
            <h1>🚗 AutoGenius Contact Page</h1>
            <p>Welcome to our automobile website! We'd love to hear from you.</p>
        </header>

        <form action="/submit" method="post" class="contact-form">
            
            <div class="form-group">
                <label for="name">Name:</label>
                <input id="name" type="text" name="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input id="email" type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Enter your message"></textarea>
            </div>

            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </main>

</body>
</html>
